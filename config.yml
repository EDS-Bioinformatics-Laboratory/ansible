---
# User configuration
#   Change to your own myDRE (!) username
username: antoine.vankampen@mydre.org

# Shared library for ALSA applications
# ALSA is the Advanced Linux Sound Architecture.
# This package contains the ALSA library and its standard plugins, as well
# as the required configuration files.

libasound: libasound2 # If libasound2 doesn't work, try libasound2t64

# Rclone configuration
#   Desktop/RD is the local directory that will be mounted to Research Drive
#   RD: is the remote webdav connection
remote_path: "RD:"
local_mount: "/home/antoine.vankampen@mydre.org/Desktop/RD"
root_path: "/home/antoine.vankampen@mydre.org"


#proxy configuration - Azure VM proxy (used for installation of R/Rstudio/Rtools)
http_proxy: "http://11.5.0.4:3128"
https_proxy: "http://11.5.0.4:3128"
ftp_proxy: "http://11.5.0.4:3128"
no_proxy: "localhost,127.0.0.1,169.254.169.254,10.0.0.0/24,file.core.windows.net,blob.core.windows.net,management.core.windows.net,management.azure.com,::1"

# Select the ansible playbooks you want to run
run_General: true
run_Vscode: true
run_Conda: true
run_Emacs: true
run_Julia: true
run_Containers: true
run_Compilers: true
run_R: true
run_Bashrc: true
