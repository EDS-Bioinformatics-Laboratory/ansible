---
# Install Docker + configure Docker daemon proxy + install Apptainer on Ubuntu.
#
# Notes / gotchas
# - Docker group membership:
#   After adding a user to the `docker` group, the user usually must log out/in
#   (or start a new shell session) for the new group membership to apply.
#
# - apt_key deprecation:
#   The `apt_key` module is considered deprecated in newer best practices.
#   It still works, but a more modern approach is to install the key into
#   /etc/apt/keyrings and reference it via `signed-by=...` in the repository.
#
# - Proxy scope:
#   The systemd drop-in proxy configuration only affects the Docker daemon.
#   It does NOT affect `apt` package downloads or Ansible's `get_url` downloads.
#   If you are behind a proxy for `apt`, configure an apt proxy (e.g.
#   /etc/apt/apt.conf.d/*). If you are behind a proxy for `get_url` (GitHub),
#   set environment variables for that task or configure system-wide proxy.
#
# - Docker socket permissions:
#   Avoid chmod 0666 on /var/run/docker.sock; it is insecure. Prefer adding
#   specific users to the `docker` group (as this playbook does).

- name: Install a general virtual machine
  hosts: all
  vars_files:
    - config.yml
  remote_user: "{{ username }}"
  become: yes
  connection: local
  gather_facts: yes

  tasks:
    - name: Install prerequisites
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: yes

    - name: Add Docker GPG key
      ansible.builtin.apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
        update_cache: yes

    - name: Start and enable Docker service
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: yes

    - name: Verify Docker installation
      ansible.builtin.command: docker --version
      register: docker_version
      changed_when: false

    - name: Display Docker version
      ansible.builtin.debug:
        msg: "{{ docker_version.stdout }}"

    - name: Ensure systemd drop-in directory for Docker exists
      ansible.builtin.file:
        path: /etc/systemd/system/docker.service.d
        state: directory
        mode: "0755"

    - name: Configure Docker proxy environment (systemd drop-in)
      ansible.builtin.copy:
        dest: /etc/systemd/system/docker.service.d/http-proxy.conf
        mode: "0644"
        content: |
          [Service]
          Environment="HTTP_PROXY=http://11.5.0.4:3128"
          Environment="HTTPS_PROXY=http://11.5.0.4:3128"
          Environment="NO_PROXY=localhost,127.0.0.1"
      notify:
        - Reload systemd manager configuration
        - Restart docker
      when: use_proxy

    - name: Allow {{ username }} to run docker without sudo (recommended)
      ansible.builtin.user:
        name: "{{ username }}"
        groups: docker
        append: true

    # -------------------------
    # Apptainer installation
    # -------------------------
    - name: Download Apptainer .deb package
      ansible.builtin.get_url:
        url: https://github.com/apptainer/apptainer/releases/download/v1.4.3/apptainer_1.4.3_amd64.deb
        dest: /tmp/apptainer_1.4.3_amd64.deb
        mode: "0644"
        force: no

    - name: Install Apptainer package
      ansible.builtin.apt:
        deb: /tmp/apptainer_1.4.3_amd64.deb
        state: present

  handlers:
    - name: Reload systemd manager configuration
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart docker
      ansible.builtin.systemd:
        name: docker
        state: restarted