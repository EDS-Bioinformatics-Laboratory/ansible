---
- name: Install a general virtual machine
  hosts: all
  vars_files:
    - config.yml
  remote_user: "{{ username }}"
  become: yes
  connection: local
  gather_facts: yes
  
  tasks:
    - name: Install prerequisites
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: yes

    - name: Add Docker GPG key
      ansible.builtin.apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
        update_cache: yes

    - name: Start and enable Docker service
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: yes

    - name: Verify Docker installation
      ansible.builtin.command:
        cmd: docker --version
      register: docker_version
      changed_when: false

    - name: Display Docker version
      ansible.builtin.debug:
        msg: "{{ docker_version.stdout }}"

    - name: Ensure systemd drop-in directory for Docker exists
      ansible.builtin.file:
        path: /etc/systemd/system/docker.service.d
        state: directory
        mode: "0755"

    - name: Configure Docker proxy environment (systemd drop-in)
      ansible.builtin.copy:
        dest: /etc/systemd/system/docker.service.d/http-proxy.conf
        mode: "0644"
        content: |
          [Service]
          Environment="HTTP_PROXY=http://11.5.0.4:3128"
          Environment="HTTPS_PROXY=http://11.5.0.4:3128"
          Environment="NO_PROXY=localhost,127.0.0.1"
      notify:
        - Reload systemd manager configuration
        - Restart docker

    # Only needed if you truly want daemon-reexec (rare). "daemon-reload" is normally enough.
    # - name: Re-exec systemd (rarely required)
    #   ansible.builtin.command: systemctl daemon-reexec

    # This is generally a bad idea from a security standpoint.
    # Prefer adding users to the docker group instead of chmod 666.
    - name: Set docker.sock permissions (NOT recommended)
      ansible.builtin.file:
        path: /var/run/docker.sock
        mode: "0666"
     #when: ansible_facts.services is not defined  # remove this line if you want it unconditional

  handlers:
    - name: Reload systemd manager configuration
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart docker
      ansible.builtin.systemd:
        name: docker
        state: restarted

## Next install Apptainer

    - name: Download Apptainer .deb package
      ansible.builtin.get_url:
        url: https://github.com/apptainer/apptainer/releases/download/v1.4.3/apptainer_1.4.3_amd64.deb
        dest: /home/{{ username }}/apptainer.deb
        mode: '0644'
        force: no

    - name: Install apptainer package
      ansible.builtin.apt:
        deb: /home/{{ username }}/apptainer.deb
        state: present
        