---
- name: Install a general virtual machine
  hosts: all
  vars_files:
    - config.yml
  remote_user: "{{ username }}"
  become: yes
  connection: local
  gather_facts: true   # recommended so you can debug/branch if needed

  tasks:
    - name: Wait for system to become reachable
      ansible.builtin.wait_for_connection:
        timeout: 300

    # --- System time / NTP (root) ---
    - name: Set timezone
      ansible.builtin.timezone:
        name: Europe/Amsterdam

    - name: Install chrony
      ansible.builtin.apt:
        name: chrony
        state: present
        update_cache: true

    - name: Enable and start chrony
      ansible.builtin.service:
        name: chrony
        enabled: true
        state: started

    # Optional: force an immediate sync (useful right after provisioning)
    - name: Make chrony step the clock immediately (if needed)
      ansible.builtin.command: chronyc -a makestep
      changed_when: false

    # --- Packages (root) ---
    - name: Update all packages to their latest version
      ansible.builtin.apt:
        name: "*"
        state: latest
        update_cache: yes

    - name: Install rclone and gedit
      ansible.builtin.apt:
        name:
          - rclone
          - gedit
        state: present

    # --- User-home items (no sudo) ---
    - name: Ensure RD directory exists on user's Desktop
      ansible.builtin.file:
        path: "{{ root_path }}/Desktop/RD"
        state: directory
        mode: "0755"
      become: no
      tags: rd

    - name: Clone ENCORE repository into user's home
      ansible.builtin.git:
        repo: https://github.com/EDS-Bioinformatics-Laboratory/ENCORE.git
        dest: "{{ root_path }}/ENCORE"
        version: "{{ ansible_repo_branch | default('main') }}"
        update: yes
      become: no

    - name: Display success message
      ansible.builtin.debug:
        msg: "Repository cloned to {{ root_path }}/ENCORE"